# AWS override — Caddy SSL termination, EBS data volumes, Kafka external listener.
#
# Usage on EC2:
#   export PUBLIC_IP=<elastic-ip>
#   docker compose -f docker-compose.yml -f aws/docker-compose.aws.yml \
#                  --env-file .env.aws up -d

services:

  # ── Caddy: HTTPS termination + automatic Let's Encrypt certs ─────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./aws/Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/caddy/data:/data
      - /data/caddy/config:/config
    environment:
      PUBLIC_IP: ${PUBLIC_IP:-localhost}
    depends_on:
      - cp-frontend
      - cp-backend
    networks:
      - default

  # ── Remove direct host-port 3001 and 80 from cp-frontend (Caddy owns 80/443)
  cp-frontend:
    ports: !reset
      - "127.0.0.1:3001:80"   # localhost only — Caddy proxies externally

  # ── cp-backend: pass domain name for platform_urls ────────────────────────
  cp-backend:
    environment:
      PUBLIC_HOST: ${PUBLIC_IP:-localhost}

  # ── Kafka: advertise public IP for external clients ───────────────────────
  kafka:
    environment:
      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:9092,EXTERNAL://${PUBLIC_IP:-localhost}:9094

  # ── Persistent data on EBS /data volume ──────────────────────────────────
  neo4j:
    volumes:
      - /data/neo4j/data:/data
      - /data/neo4j/logs:/logs
      - /data/neo4j/plugins:/plugins

  qdrant:
    volumes:
      - /data/qdrant:/qdrant/storage

  timescale:
    volumes:
      - /data/timescale:/var/lib/postgresql/data

  postgres:
    volumes:
      - /data/postgres:/var/lib/postgresql/data

  minio:
    volumes:
      - /data/minio:/data

  grafana:
    volumes:
      - /data/grafana:/var/lib/grafana

  vault:
    volumes:
      - /data/vault:/vault/file

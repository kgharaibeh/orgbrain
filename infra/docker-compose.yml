version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  OrgBrain — Banking Platform  |  Full Infrastructure Stack
#  Phases covered: 0 (foundation) + 1 (governance membrane)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  orgbrain:
    driver: bridge

volumes:
  kafka_data:
  zookeeper_data:
  minio_data:
  vault_data:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  portainer_data:
  timescale_data:
  grafana_data:
  flink_data:
  airflow_logs:
  ollama_data:

# ─────────────────────────────────────────────────────────────────────────────
#  KAFKA  (Bitnami — KRaft mode, single-broker for dev)
# ─────────────────────────────────────────────────────────────────────────────
services:

  kafka:
    image: apache/kafka:3.9.2
    container_name: orgbrain-kafka
    networks: [orgbrain]
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode — no Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: -1
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "q1Wa8DExTuO6oOlvY2R5Ug"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"]
      start_period: 30s
      interval: 10s
      timeout: 10s
      retries: 15

  # ─── Schema Registry (Apicurio) ───────────────────────────────────────────
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.13.Final
    container_name: orgbrain-schema-registry
    networks: [orgbrain]
    ports:
      - "8081:8080"
    environment:
      QUARKUS_HTTP_PORT: 8080
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      start_period: 20s
      interval: 15s
      timeout: 5s
      retries: 10

  # ─── Kafka Connect (Debezium + MinIO sink) ────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: orgbrain-kafka-connect
    networks: [orgbrain]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: orgbrain-connect
      CONFIG_STORAGE_TOPIC: _connect_configs
      OFFSET_STORAGE_TOPIC: _connect_offsets
      STATUS_STORAGE_TOPIC: _connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Apicurio schema registry for Avro
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      # Enable Apicurio converter (download via CONNECT_PLUGIN_PATH)
      CONNECT_SCHEMA_REGISTRY_URL: http://schema-registry:8080/apis/ccompat/v6
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      start_period: 30s
      interval: 15s
      timeout: 5s
      retries: 15

  # ─── Kafka UI ─────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: orgbrain-kafka-ui
    networks: [orgbrain]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: orgbrain
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8080/apis/ccompat/v6
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      kafka:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
#  SOURCE DATABASE  (PostgreSQL — simulated Core Banking System)
# ─────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: orgbrain-postgres
    networks: [orgbrain]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: orgbrain
      POSTGRES_PASSWORD: orgbrain_secret
      POSTGRES_DB: core_banking
      # Required for Debezium logical replication
      POSTGRES_HOST_AUTH_METHOD: trust
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=4
      -c max_replication_slots=4
      -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/00_create_dbs.sql:/docker-entrypoint-initdb.d/00_create_dbs.sql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgbrain -d core_banking"]
      interval: 10s
      timeout: 5s
      retries: 10

# ─────────────────────────────────────────────────────────────────────────────
#  MINIO  (S3-compatible object storage — Iceberg data lake)
# ─────────────────────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: orgbrain-minio
    networks: [orgbrain]
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # Console UI
    environment:
      MINIO_ROOT_USER: orgbrain_minio
      MINIO_ROOT_PASSWORD: orgbrain_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: orgbrain-minio-init
    networks: [orgbrain]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 orgbrain_minio orgbrain_minio_secret &&
        mc mb --ignore-existing local/orgbrain-raw &&
        mc mb --ignore-existing local/orgbrain-clean &&
        mc mb --ignore-existing local/orgbrain-iceberg &&
        mc mb --ignore-existing local/orgbrain-checkpoints &&
        echo 'MinIO buckets created.'
      "
    restart: on-failure

# ─────────────────────────────────────────────────────────────────────────────
#  HASHICORP VAULT  (FPE key management + deanonymization access control)
# ─────────────────────────────────────────────────────────────────────────────

  vault:
    image: hashicorp/vault:1.21
    container_name: orgbrain-vault
    networks: [orgbrain]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: orgbrain-vault-root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add: [IPC_LOCK]
    volumes:
      - vault_data:/vault/data
      - ./vault/init.sh:/vault/init.sh
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.21
    container_name: orgbrain-vault-init
    networks: [orgbrain]
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: orgbrain-vault-root
    entrypoint: /bin/sh /vault/init.sh
    volumes:
      - ./vault/init.sh:/vault/init.sh
    restart: on-failure

# ─────────────────────────────────────────────────────────────────────────────
#  BRAIN STORES
# ─────────────────────────────────────────────────────────────────────────────

  # ─── Graph Store (Neo4j Community) ────────────────────────────────────────
  neo4j:
    image: neo4j:community
    container_name: orgbrain-neo4j
    networks: [orgbrain]
    ports:
      - "7474:7474"      # Browser UI
      - "7687:7687"      # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/orgbrain_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ../brain/graph/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "orgbrain_neo4j", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 15

  # ─── Vector Store (Qdrant) ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: orgbrain-qdrant
    networks: [orgbrain]
    ports:
      - "6333:6333"      # REST API
      - "6334:6334"      # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Time-series Store (TimescaleDB) ──────────────────────────────────────
  timescale:
    image: timescale/timescaledb:latest-pg16
    container_name: orgbrain-timescale
    networks: [orgbrain]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: orgbrain
      POSTGRES_PASSWORD: orgbrain_secret
      POSTGRES_DB: orgbrain_metrics
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../brain/timeseries/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgbrain -d orgbrain_metrics"]
      interval: 10s
      timeout: 5s
      retries: 10

# ─────────────────────────────────────────────────────────────────────────────
#  LLM INFERENCE  (Ollama — fully local, no data leaves premises)
# ─────────────────────────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: orgbrain-ollama
    networks: [orgbrain]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 60s
      interval: 15s
      timeout: 15s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    container_name: orgbrain-ollama-init
    networks: [orgbrain]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        ollama pull nomic-embed-text &&
        ollama pull llama3.1:8b &&
        echo 'Ollama models ready.'
      "
    restart: on-failure

# ─────────────────────────────────────────────────────────────────────────────
#  APACHE FLINK  (stream processing — PII anonymizer + brain feed jobs)
# ─────────────────────────────────────────────────────────────────────────────

  flink-jobmanager:
    build:
      context: ..
      dockerfile: infra/flink/Dockerfile
    image: orgbrain-flink-pyflink
    container_name: orgbrain-flink-jobmanager
    networks: [orgbrain]
    ports:
      - "8082:8081"      # Flink Web UI
    restart: unless-stopped
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: filesystem
        state.checkpoints.dir: s3://orgbrain-checkpoints/flink
        s3.endpoint: http://minio:9000
        s3.access-key: orgbrain_minio
        s3.secret-key: orgbrain_minio_secret
        s3.path.style.access: true
    volumes:
      - flink_data:/tmp/flink

  flink-taskmanager:
    image: orgbrain-flink-pyflink
    container_name: orgbrain-flink-taskmanager
    networks: [orgbrain]
    restart: unless-stopped
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        state.backend: filesystem
        state.checkpoints.dir: s3://orgbrain-checkpoints/flink
        s3.endpoint: http://minio:9000
        s3.access-key: orgbrain_minio
        s3.secret-key: orgbrain_minio_secret
        s3.path.style.access: true
    volumes:
      - flink_data:/tmp/flink
    depends_on:
      - flink-jobmanager

# ─────────────────────────────────────────────────────────────────────────────
#  OBSERVABILITY
# ─────────────────────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:10.4.2
    container_name: orgbrain-grafana
    networks: [orgbrain]
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: orgbrain_grafana
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - timescale

# ─────────────────────────────────────────────────────────────────────────────
#  PORTAINER CE  (Docker container management web UI)
#  Handles: start/stop/restart/logs for ALL services
# ─────────────────────────────────────────────────────────────────────────────

  portainer:
    image: portainer/portainer-ce:2.40.0
    container_name: orgbrain-portainer
    networks: [orgbrain]
    ports:
      - "9443:9443"      # HTTPS UI
      - "9900:9000"      # HTTP UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
#  APACHE AIRFLOW 2.10  (Batch orchestration — ontology enrichment + scoring)
#  LocalExecutor: postgres backend, no Redis/Celery required for single-node dev
# ─────────────────────────────────────────────────────────────────────────────

  airflow-init:
    image: apache/airflow:2.10.5-python3.11
    container_name: orgbrain-airflow-init
    networks: [orgbrain]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://orgbrain:orgbrain_secret@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: orgbrain-airflow-webserver-secret
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password orgbrain_airflow --firstname OrgBrain --lastname Admin --role Admin --email admin@orgbrain.local &&
        echo 'Airflow initialised.'
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.10.5-python3.11
    container_name: orgbrain-airflow-webserver
    networks: [orgbrain]
    ports:
      - "8090:8080"
    command: webserver
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://orgbrain:orgbrain_secret@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: orgbrain-airflow-webserver-secret
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: orgbrain_neo4j
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      TIMESCALE_HOST: timescale
      TIMESCALE_PORT: "5432"
      TIMESCALE_DB: orgbrain_metrics
      TIMESCALE_USER: orgbrain
      TIMESCALE_PASSWORD: orgbrain_secret
      OLLAMA_HOST: http://ollama:11434
      DATABASE_URL: postgresql://orgbrain:orgbrain_secret@postgres:5432/core_banking
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.11
    container_name: orgbrain-airflow-scheduler
    networks: [orgbrain]
    command: scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://orgbrain:orgbrain_secret@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: orgbrain-airflow-webserver-secret
      AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: orgbrain_neo4j
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      TIMESCALE_HOST: timescale
      TIMESCALE_PORT: "5432"
      TIMESCALE_DB: orgbrain_metrics
      TIMESCALE_USER: orgbrain
      TIMESCALE_PASSWORD: orgbrain_secret
      OLLAMA_HOST: http://ollama:11434
      DATABASE_URL: postgresql://orgbrain:orgbrain_secret@postgres:5432/core_banking
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────────────────────
#  ORGBRAIN CONTROL PLANE  (Central admin web UI — all custom operations)
#  • Data source onboarding wizard
#  • PII governance rules editor
#  • Brain monitoring dashboard
#  • Flink job management
#  • Agent chat interface
#  • Unified system health
# ─────────────────────────────────────────────────────────────────────────────

  cp-backend:
    build:
      context: ../control_plane/backend
      dockerfile: Dockerfile
    container_name: orgbrain-cp-backend
    networks: [orgbrain]
    ports:
      - "8088:8088"
    environment:
      DATABASE_URL: postgresql://orgbrain:orgbrain_secret@postgres:5432/core_banking
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      FLINK_URL: http://flink-jobmanager:8081
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: orgbrain-vault-root
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: orgbrain_neo4j
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      TIMESCALE_HOST: timescale
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: orgbrain_metrics
      TIMESCALE_USER: orgbrain
      TIMESCALE_PASSWORD: orgbrain_secret
      OLLAMA_HOST: http://ollama:11434
      # ── AWS Bedrock (LLM) ─────────────────────────────────────────────────
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-us.anthropic.claude-opus-4-6-v1}
      DOCKER_HOST: unix:///var/run/docker.sock
      AIRFLOW_URL: http://airflow-webserver:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../governance/anonymizer:/app/jobs
      - ../governance/rules:/app/rules
      - ../ontology:/app/ontology
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  cp-frontend:
    build:
      context: ../control_plane/frontend
      dockerfile: Dockerfile
    container_name: orgbrain-cp-frontend
    networks: [orgbrain]
    ports:
      - "3001:80"
    depends_on:
      cp-backend:
        condition: service_healthy
    restart: unless-stopped
